version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:7.0
    container_name: ai-calls-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: ai-voice-calls
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - ai-calls-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: ai-calls-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - ai-calls-network

  # Backend API
  backend:
    build: .
    container_name: ai-calls-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://mongodb:27017/ai-voice-calls
      REDIS_HOST: redis
      REDIS_PORT: 6379
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
      - ./recordings:/app/recordings
    depends_on:
      - mongodb
      - redis
    networks:
      - ai-calls-network

  # Frontend (React Dashboard)
  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: ai-calls-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - ai-calls-network

volumes:
  mongodb_data:
  redis_data:

networks:
  ai-calls-network:
    driver: bridge
